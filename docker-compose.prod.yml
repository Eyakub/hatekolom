# ============================================
# Happy Baby — Production Docker Compose
# ============================================
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Prerequisites:
#   1. Copy backend/.env.example → backend/.env.prod and fill real values
#   2. Set DOMAIN environment variable
#   3. Run certbot for SSL certs (see scripts/ssl-init.sh)

services:
  # ============================================
  # PostgreSQL Database — NOT exposed to host
  # ============================================
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lms_db}
      POSTGRES_USER: ${POSTGRES_USER:-lms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # No ports exposed — only internal network
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lms_user} -d ${POSTGRES_DB:-lms_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis — NOT exposed to host
  # ============================================
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # FastAPI Backend
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    # No ports exposed — Nginx handles routing
    env_file:
      - ./backend/.env.prod
    volumes:
      - backend_static:/app/static
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Next.js Frontend
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    # No ports exposed — Nginx handles routing
    environment:
      - NEXT_PUBLIC_API_URL=https://${DOMAIN}/api/v1
      - NEXT_PUBLIC_APP_NAME=${APP_NAME:-Happy Baby}
      - NODE_ENV=production
    depends_on:
      - backend

  # ============================================
  # Nginx Reverse Proxy + SSL
  # ============================================
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend

  # ============================================
  # Certbot (SSL Certificate Renewal)
  # ============================================
  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # ============================================
  # Database Backup Cron
  # ============================================
  db-backup:
    image: postgres:16-alpine
    restart: always
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    environment:
      PGHOST: db
      PGUSER: ${POSTGRES_USER:-lms_user}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB:-lms_db}
    entrypoint: ["/bin/sh", "-c", "chmod +x /backup.sh && while true; do /backup.sh; sleep 86400; done"]
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  backend_static:
