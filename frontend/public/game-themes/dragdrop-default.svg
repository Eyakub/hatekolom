<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF3E0"/>
      <stop offset="100%" style="stop-color:#FFE0B2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Floating circles -->
  <g opacity="0.1" fill="#FF8F00">
    <circle cx="80" cy="100" r="32"/>
    <circle cx="720" cy="80" r="24"/>
    <circle cx="50" cy="400" r="20"/>
    <circle cx="760" cy="350" r="36"/>
    <circle cx="400" cy="40" r="28"/>
    <circle cx="180" cy="540" r="22"/>
    <circle cx="650" cy="520" r="30"/>
    <circle cx="300" cy="500" r="16"/>
    <circle cx="520" cy="560" r="20"/>
  </g>

  <!-- Floating triangles -->
  <g opacity="0.09" fill="#FB8C00">
    <polygon points="130,200 160,260 100,260"/>
    <polygon points="660,150 695,215 625,215"/>
    <polygon points="30,500 60,555 0,555"/>
    <polygon points="750,450 785,510 715,510"/>
    <polygon points="390,520 420,575 360,575"/>
    <polygon points="700,260 728,310 672,310"/>
    <polygon points="80,340 108,390 52,390"/>
  </g>

  <!-- Floating squares/rectangles -->
  <g opacity="0.09" fill="#EF6C00">
    <rect x="600" y="60" width="40" height="40" rx="6" transform="rotate(15, 620, 80)"/>
    <rect x="140" y="420" width="36" height="36" rx="5" transform="rotate(-10, 158, 438)"/>
    <rect x="700" y="460" width="44" height="44" rx="7" transform="rotate(20, 722, 482)"/>
    <rect x="30" y="150" width="34" height="34" rx="5" transform="rotate(8, 47, 167)"/>
    <rect x="450" y="520" width="38" height="38" rx="6" transform="rotate(-15, 469, 539)"/>
    <rect x="360" y="40" width="30" height="30" rx="4" transform="rotate(25, 375, 55)"/>
    <rect x="530" y="440" width="36" height="36" rx="5" transform="rotate(-8, 548, 458)"/>
  </g>

  <!-- Small diamond shapes -->
  <g opacity="0.08" fill="#F57C00">
    <polygon points="200,80 214,100 200,120 186,100"/>
    <polygon points="580,520 594,540 580,560 566,540"/>
    <polygon points="740,200 754,220 740,240 726,220"/>
    <polygon points="60,260 74,280 60,300 46,280"/>
    <polygon points="450,80 464,100 450,120 436,100"/>
  </g>

  <!-- Tiny accent dots -->
  <g opacity="0.12" fill="#FFB74D">
    <circle cx="250" cy="200" r="5"/>
    <circle cx="550" cy="140" r="4"/>
    <circle cx="160" cy="300" r="5"/>
    <circle cx="640" cy="300" r="4"/>
    <circle cx="420" cy="460" r="5"/>
    <circle cx="780" cy="520" r="4"/>
    <circle cx="20" cy="560" r="4"/>
    <circle cx="340" cy="160" r="5"/>
  </g>
</svg>
