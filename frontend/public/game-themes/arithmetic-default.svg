<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9"/>
      <stop offset="100%" style="stop-color:#C8E6C9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Chalk-style numbers scattered at low opacity -->
  <g font-family="Georgia, 'Times New Roman', serif" fill="#2E7D32">

    <!-- Large background numbers, very faint -->
    <text x="30"  y="130" font-size="72" opacity="0.06">7</text>
    <text x="680" y="110" font-size="68" opacity="0.06">3</text>
    <text x="350" y="80"  font-size="60" opacity="0.06">5</text>
    <text x="120" y="520" font-size="64" opacity="0.06">2</text>
    <text x="640" y="530" font-size="70" opacity="0.06">9</text>
    <text x="730" y="320" font-size="66" opacity="0.06">1</text>
    <text x="20"  y="340" font-size="62" opacity="0.06">8</text>
    <text x="380" y="560" font-size="58" opacity="0.06">4</text>
    <text x="200" y="200" font-size="50" opacity="0.05">6</text>
    <text x="560" y="220" font-size="50" opacity="0.05">0</text>

    <!-- Medium numbers in mid zones -->
    <text x="480" y="460" font-size="40" opacity="0.07">7</text>
    <text x="270" y="420" font-size="44" opacity="0.07">3</text>
    <text x="600" y="380" font-size="36" opacity="0.06">5</text>
    <text x="140" y="380" font-size="38" opacity="0.07">2</text>
    <text x="440" y="160" font-size="36" opacity="0.07">9</text>
  </g>

  <!-- Plus signs -->
  <g stroke="#388E3C" stroke-width="3" fill="none" stroke-linecap="round">
    <g opacity="0.1">
      <line x1="640" y1="160" x2="660" y2="160"/>
      <line x1="650" y1="150" x2="650" y2="170"/>
    </g>
    <g opacity="0.09">
      <line x1="100" y1="260" x2="120" y2="260"/>
      <line x1="110" y1="250" x2="110" y2="270"/>
    </g>
    <g opacity="0.08">
      <line x1="730" y1="420" x2="755" y2="420"/>
      <line x1="742" y1="408" x2="742" y2="432"/>
    </g>
    <g opacity="0.09">
      <line x1="300" y1="490" x2="320" y2="490"/>
      <line x1="310" y1="480" x2="310" y2="500"/>
    </g>
    <g opacity="0.08">
      <line x1="500" y1="540" x2="520" y2="540"/>
      <line x1="510" y1="530" x2="510" y2="550"/>
    </g>
  </g>

  <!-- Minus signs -->
  <g stroke="#2E7D32" stroke-width="3" fill="none" stroke-linecap="round">
    <line x1="50" y1="440" x2="74" y2="440" opacity="0.1"/>
    <line x1="680" y1="220" x2="704" y2="220" opacity="0.09"/>
    <line x1="370" y1="30"  x2="394" y2="30"  opacity="0.08"/>
    <line x1="560" y1="490" x2="584" y2="490" opacity="0.09"/>
    <line x1="170" y1="100" x2="194" y2="100" opacity="0.08"/>
  </g>

  <!-- Multiply (×) signs using two crossing lines -->
  <g stroke="#1B5E20" stroke-width="2.5" fill="none" stroke-linecap="round">
    <g opacity="0.09">
      <line x1="745" y1="80"  x2="763" y2="98"/>
      <line x1="763" y1="80"  x2="745" y2="98"/>
    </g>
    <g opacity="0.08">
      <line x1="55"  y1="170" x2="71"  y2="186"/>
      <line x1="71"  y1="170" x2="55"  y2="186"/>
    </g>
    <g opacity="0.09">
      <line x1="460" y1="510" x2="476" y2="526"/>
      <line x1="476" y1="510" x2="460" y2="526"/>
    </g>
    <g opacity="0.08">
      <line x1="220" y1="480" x2="236" y2="496"/>
      <line x1="236" y1="480" x2="220" y2="496"/>
    </g>
  </g>

  <!-- Equals signs -->
  <g stroke="#33691E" stroke-width="2.5" fill="none" stroke-linecap="round">
    <g opacity="0.09">
      <line x1="580" y1="80"  x2="606" y2="80"/>
      <line x1="580" y1="90"  x2="606" y2="90"/>
    </g>
    <g opacity="0.08">
      <line x1="30"  y1="550" x2="56"  y2="550"/>
      <line x1="30"  y1="560" x2="56"  y2="560"/>
    </g>
    <g opacity="0.09">
      <line x1="710" y1="490" x2="736" y2="490"/>
      <line x1="710" y1="500" x2="736" y2="500"/>
    </g>
  </g>

  <!-- Tiny chalk dust dots -->
  <g opacity="0.08" fill="#43A047">
    <circle cx="250" cy="60"  r="3"/>
    <circle cx="320" cy="300" r="3"/>
    <circle cx="490" cy="300" r="3"/>
    <circle cx="620" cy="300" r="2.5"/>
    <circle cx="180" cy="150" r="2.5"/>
    <circle cx="740" cy="550" r="3"/>
    <circle cx="360" cy="130" r="2.5"/>
  </g>
</svg>
