<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBF5"/>
      <stop offset="100%" style="stop-color:#FFF8E7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Ruled lines — notebook style -->
  <g opacity="0.06" stroke="#8D6E63" stroke-width="1" fill="none">
    <line x1="0" y1="80"  x2="800" y2="80"/>
    <line x1="0" y1="112" x2="800" y2="112"/>
    <line x1="0" y1="144" x2="800" y2="144"/>
    <line x1="0" y1="176" x2="800" y2="176"/>
    <line x1="0" y1="208" x2="800" y2="208"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="272" x2="800" y2="272"/>
    <line x1="0" y1="304" x2="800" y2="304"/>
    <line x1="0" y1="336" x2="800" y2="336"/>
    <line x1="0" y1="368" x2="800" y2="368"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="432" x2="800" y2="432"/>
    <line x1="0" y1="464" x2="800" y2="464"/>
    <line x1="0" y1="496" x2="800" y2="496"/>
    <line x1="0" y1="528" x2="800" y2="528"/>
    <line x1="0" y1="560" x2="800" y2="560"/>
  </g>

  <!-- Left margin line -->
  <line x1="70" y1="0" x2="70" y2="600" stroke="#FFCCBC" stroke-width="1.5" opacity="0.25"/>

  <!-- Pencil doodle top-left margin -->
  <g opacity="0.1" stroke="#795548" stroke-width="1.5" fill="none">
    <!-- Pencil body -->
    <rect x="15" y="60" width="10" height="36" rx="1" fill="#FFF176" stroke="#795548"/>
    <!-- Pencil tip -->
    <polygon points="15,96 25,96 20,108" fill="#FFCC80" stroke="#795548"/>
    <!-- Pencil eraser -->
    <rect x="15" y="56" width="10" height="6" rx="1" fill="#EF9A9A" stroke="#795548"/>
    <!-- Metal band -->
    <rect x="15" y="62" width="10" height="4" fill="#B0BEC5" stroke="#795548"/>
  </g>

  <!-- Eraser doodle bottom-left margin -->
  <g opacity="0.1" fill="#FFCCBC" stroke="#795548" stroke-width="1.5">
    <rect x="10" y="480" width="42" height="22" rx="4"/>
    <!-- Eraser highlight -->
    <rect x="10" y="480" width="42" height="8" rx="4" fill="#FFE0D6" stroke="none"/>
  </g>

  <!-- Small star doodle top-right margin -->
  <g opacity="0.08" fill="#F9A825">
    <path d="M762,100 L764,107 L771,107 L766,112 L768,119 L762,114 L756,119 L758,112 L753,107 L760,107 Z"/>
    <path d="M762,160 L764,167 L771,167 L766,172 L768,179 L762,174 L756,179 L758,172 L753,167 L760,167 Z"/>
    <path d="M762,220 L764,227 L771,227 L766,232 L768,239 L762,234 L756,239 L758,232 L753,227 L760,227 Z"/>
  </g>

  <!-- Doodle squiggles in margins -->
  <g opacity="0.07" stroke="#A1887F" stroke-width="1.5" fill="none">
    <path d="M20,200 Q30,195 40,200 Q50,205 60,200"/>
    <path d="M20,250 Q30,245 40,250 Q50,255 60,250"/>
    <path d="M730,350 Q740,345 750,350 Q760,355 770,350 Q780,355 790,350"/>
    <path d="M730,400 Q740,395 750,400 Q760,405 770,400 Q780,405 790,400"/>
  </g>

  <!-- Small letter doodles in top margin -->
  <g opacity="0.07" font-family="Georgia, serif" font-size="14" fill="#6D4C41">
    <text x="100" y="40">A</text>
    <text x="160" y="40">B</text>
    <text x="220" y="40">C</text>
    <text x="280" y="40">D</text>
    <text x="340" y="40">E</text>
    <text x="400" y="40">F</text>
    <text x="460" y="40">G</text>
    <text x="520" y="40">H</text>
    <text x="580" y="40">I</text>
    <text x="640" y="40">J</text>
    <text x="700" y="40">K</text>
  </g>

  <!-- Tiny dot grid overlay (very faint) -->
  <g opacity="0.05" fill="#A1887F">
    <circle cx="150" cy="130" r="2"/>
    <circle cx="300" cy="130" r="2"/>
    <circle cx="450" cy="130" r="2"/>
    <circle cx="600" cy="130" r="2"/>
    <circle cx="150" cy="290" r="2"/>
    <circle cx="300" cy="290" r="2"/>
    <circle cx="450" cy="290" r="2"/>
    <circle cx="600" cy="290" r="2"/>
    <circle cx="150" cy="450" r="2"/>
    <circle cx="300" cy="450" r="2"/>
    <circle cx="450" cy="450" r="2"/>
    <circle cx="600" cy="450" r="2"/>
  </g>
</svg>
